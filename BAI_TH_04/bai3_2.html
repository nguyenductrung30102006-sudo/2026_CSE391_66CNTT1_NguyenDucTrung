<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Multi Step Form</title>
    <link rel="stylesheet" href="bai3_2.css" />
  </head>

  <body>
    <h2>Dang Ky Tai Khoan</h2>

    <div class="progress">
      <div id="progressBar"></div>
    </div>
    <p id="stepText">Buoc 1 / 3</p>

    <form id="form">
      <!-- STEP 1 -->
      <div class="step">
        <label>Ho ten</label>
        <input type="text" id="fullname" />
        <span class="error" id="nameError"></span>

        <label>Ngay sinh</label>
        <input type="date" id="birth" />
        <span class="error" id="birthError"></span>

        <label>Gioi tinh</label>
        <div class="gender">
          <label><input type="radio" name="gender" value="Nam" /> Nam</label>
          <label><input type="radio" name="gender" value="Nu" /> Nu</label>
        </div>
        <span class="error" id="genderError"></span>

        <button type="button" id="next1">Tiep theo</button>
      </div>

      <!-- STEP 2 -->
      <div class="step">
        <label>Email</label>
        <input type="text" id="email" />
        <span class="error" id="emailError"></span>

        <label>Mat khau</label>
        <input type="password" id="password" />
        <span class="error" id="passError"></span>

        <label>Xac nhan mat khau</label>
        <input type="password" id="confirm" />
        <span class="error" id="confirmError"></span>

        <button type="button" id="back1">Quay lai</button>
        <button type="button" id="next2">Tiep theo</button>
      </div>

      <!-- STEP 3 -->
      <div class="step">
        <h3>Xac nhan thong tin</h3>

        <p id="summary"></p>

        <button type="button" id="back2">Quay lai</button>
        <button type="submit">Dang ky</button>
      </div>
    </form>

    <div id="success"></div>

    <script src="bai3_2.js"></script>
  </body>
</html>
